services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vot_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-vot_tradings}
    ports:
      # Host port defaults to 5433 (not 5432) to avoid colliding with a
      # locally-installed Postgres server on the default port.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vot} -d ${POSTGRES_DB:-vot_tradings}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    environment:
      REDIS_ARGS: ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
